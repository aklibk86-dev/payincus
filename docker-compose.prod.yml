# ============================================================================
# PayIncus Docker Compose 生产配置（使用预构建镜像）
# 从 Docker Hub 或 GHCR 拉取已构建的镜像，无需本地构建
#
# 使用方式:
#   1. 在 .env.docker 中设置 IMAGE_TAG
#   2. 执行: docker compose -f docker-compose.prod.yml up -d
#
# 镜像地址:
#   Docker Hub:  docker.io/aklibk/payincus-backend:<IMAGE_TAG>
#   Docker Hub:  docker.io/aklibk/payincus-frontend:<IMAGE_TAG>
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payincus}
      POSTGRES_USER: ${POSTGRES_USER:-payincus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-docker.io/aklibk/payincus-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      TRUST_PROXY: "true"
      SERVE_STATIC_CLIENT: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-payincus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payincus}
      INCUDAL_APP_DIR: /app
      INCUDAL_INSTALL_DIR: /opt/incudal
      SYSTEM_UPDATE_LOG_DIR: /opt/incudal/update-logs
      PLUGIN_MARKET_PUBLISH_DIR: /opt/incudal/plugin-market
      PLUGIN_INSTALL_DIR: /opt/incudal/plugins
      PLUGIN_DATA_DIR: /opt/incudal/plugin-data
      PLUGIN_LOG_DIR: /opt/incudal/plugin-logs
      PLUGIN_STAGING_DIR: /opt/incudal/plugin-staging
      THEME_MARKET_PUBLISH_DIR: /opt/incudal/theme-market
      THEME_INSTALL_DIR: /opt/incudal/themes
      THEME_DATA_DIR: /opt/incudal/theme-data
      THEME_STAGING_DIR: /opt/incudal/theme-staging
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - payincus-data:/opt/incudal
    expose:
      - "3001"

  frontend:
    image: ${FRONTEND_IMAGE:-docker.io/aklibk/payincus-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: http://backend:3001
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-50m}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${USER_HTTP_PORT:-8080}:80"
      - "${ADMIN_HTTP_PORT:-8081}:81"

volumes:
  postgres-data:
  payincus-data:
